name: Daily Database Update

on:
  schedule:
    - cron: '0 2 * * *'  # Každou noc ve 2:00 (UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Daily update
        env:
          WS_USER: ${{ secrets.WS_USER }}
          WS_PASS: ${{ secrets.WS_PASS }}
        run: python scripts/update_db.py

      - name: Enrich with CSFD
        run: python scripts/csfd_enrich.py
        continue-on-error: true

      - name: Commit & Push DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/
          git diff --staged --quiet || git commit -m "DB update $(date +'%Y-%m-%d')"
          git push
