name: Build Full Database

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Každou neděli ve 2:00

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build database
        env:
          WS_USER: ${{ secrets.WS_USER }}
          WS_PASS: ${{ secrets.WS_PASS }}
        run: python scripts/build_db.py

      - name: Enrich with CSFD
        run: python scripts/csfd_enrich.py
        continue-on-error: true  # Nevadí když ČSFD selže

      - name: Commit & Push DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/
          git diff --staged --quiet || git commit -m "DB build $(date +'%Y-%m-%d %H:%M')"
          git push
