name: Build Full Database

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build database
        env:
          WS_USER: ${{ secrets.WS_USER }}
          WS_PASS: ${{ secrets.WS_PASS }}
        run: python scripts/build_db.py

      - name: Commit & Push DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/
          git diff --staged --quiet || git commit -m "DB build $(date +'%Y-%m-%d %H:%M')"
          git push
